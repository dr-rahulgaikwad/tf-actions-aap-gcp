version: '3'

vars:
  TERRAFORM_DIR: terraform

tasks:
  # Quick deployment
  quick-deploy:
    desc: "Quick deployment guide for HCP Terraform"
    cmds:
      - echo "=== Quick Deploy Guide ==="
      - echo "1. Setup Vault (run 'task setup-vault')"
      - echo "2. Configure HCP Terraform workspace"
      - echo "3. Push code to GitHub (triggers deployment)"
      - echo "4. Setup AAP (run 'task setup-aap-guide')"
      - echo "5. Test (run 'task test-deployment')"

  # Validation
  validate:
    desc: "Validate entire configuration before deployment"
    cmds:
      - echo "=== Running Pre-Deployment Validation ==="
      - task: validate-tools
      - task: validate-gcp
      - task: validate-vault
      - task: validate-terraform
      - echo "✓ All validations passed!"

  validate-tools:
    desc: "Check required tools are installed"
    cmds:
      - echo "Checking required tools..."
      - command -v gcloud >/dev/null 2>&1 || (echo "✗ gcloud not found" && exit 1)
      - command -v vault >/dev/null 2>&1 || (echo "✗ vault not found" && exit 1)
      - command -v terraform >/dev/null 2>&1 || echo "⚠ terraform not found (optional for HCP Terraform)"
      - echo "✓ Required tools installed"

  validate-gcp:
    desc: "Validate GCP configuration"
    cmds:
      - echo "Checking GCP authentication..."
      - gcloud auth list --filter=status:ACTIVE --format="value(account)" || (echo "✗ Not authenticated to GCP" && exit 1)
      - echo "Checking GCP project..."
      - gcloud config get-value project || (echo "✗ No GCP project set" && exit 1)
      - echo "✓ GCP configuration valid"

  validate-vault:
    desc: "Validate Vault configuration"
    cmds:
      - echo "Checking Vault connectivity..."
      - vault status || (echo "✗ Cannot connect to Vault" && exit 1)
      - echo "Checking Vault authentication..."
      - vault token lookup || (echo "✗ Not authenticated to Vault" && exit 1)
      - echo "✓ Vault configuration valid"

  validate-terraform:
    desc: "Validate Terraform configuration"
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - echo "Validating Terraform syntax..."
      - terraform fmt -check -recursive || (echo "⚠ Run 'terraform fmt -recursive' to fix formatting" && exit 1)
      - terraform validate || (echo "✗ Terraform validation failed" && exit 1)
      - echo "✓ Terraform configuration valid"

  # Vault setup automation
  setup-vault:
    desc: "Setup Vault configuration (interactive)"
    cmds:
      - echo "=== Vault Setup Wizard ==="
      - task: setup-vault-jwt
      - task: setup-vault-gcp
      - task: setup-vault-aap
      - echo "✓ Vault setup complete!"

  setup-vault-jwt:
    desc: "Configure Vault JWT auth for Terraform Cloud"
    cmds:
      - echo "Configuring JWT auth..."
      - vault auth enable jwt 2>/dev/null || echo "JWT auth already enabled"
      - vault write auth/jwt/config bound_issuer="https://app.terraform.io" oidc_discovery_url="https://app.terraform.io"
      - |
        vault policy write terraform-provisioner - <<'EOF'
        path "gcp/token/terraform-provisioner" { capabilities = ["read"] }
        path "secret/data/aap/oauth2" { capabilities = ["read"] }
        EOF
      - |
        read -p "Enter your Terraform Cloud organization name: " ORG_NAME
        cat > /tmp/jwt-role.json <<EOF
        {
          "role_type": "jwt",
          "bound_audiences": ["vault.workload.identity"],
          "bound_claims_type": "glob",
          "bound_claims": {
            "sub": "organization:${ORG_NAME}:project:*:workspace:*:run_phase:*"
          },
          "user_claim": "terraform_full_workspace",
          "token_ttl": "20m",
          "token_policies": ["terraform-provisioner"]
        }
        EOF
        vault write auth/jwt/role/terraform-cloud @/tmp/jwt-role.json
        rm -f /tmp/jwt-role.json
      - echo "✓ JWT auth configured"

  setup-vault-gcp:
    desc: "Configure Vault GCP secrets engine"
    cmds:
      - echo "Configuring GCP secrets engine..."
      - vault secrets enable gcp 2>/dev/null || echo "GCP secrets engine already enabled"
      - |
        read -p "Enter GCP project ID: " PROJECT_ID
        PROJECT_ID=$(echo "$PROJECT_ID" | xargs)
        echo "Using GCP project: ${PROJECT_ID}"
        echo "Creating Vault admin service account..."
        gcloud iam service-accounts create vault-admin --display-name="Vault Admin" 2>/dev/null || echo "Service account exists"
        echo "Granting IAM permissions..."
        gcloud projects add-iam-policy-binding ${PROJECT_ID} --member="serviceAccount:vault-admin@${PROJECT_ID}.iam.gserviceaccount.com" --role="roles/iam.serviceAccountAdmin" --condition=None
        gcloud projects add-iam-policy-binding ${PROJECT_ID} --member="serviceAccount:vault-admin@${PROJECT_ID}.iam.gserviceaccount.com" --role="roles/iam.serviceAccountKeyAdmin" --condition=None
        gcloud projects add-iam-policy-binding ${PROJECT_ID} --member="serviceAccount:vault-admin@${PROJECT_ID}.iam.gserviceaccount.com" --role="roles/resourcemanager.projectIamAdmin" --condition=None
        echo "Waiting for IAM propagation (10 seconds)..."
        sleep 10
        echo "Creating service account key..."
        gcloud iam service-accounts keys create /tmp/vault-admin-key.json --iam-account=vault-admin@${PROJECT_ID}.iam.gserviceaccount.com
        echo "Configuring Vault GCP secrets engine..."
        vault write gcp/config credentials=@/tmp/vault-admin-key.json ttl=3600 max_ttl=86400
        rm -f /tmp/vault-admin-key.json
        echo "Creating GCP roleset (this may take 30-60 seconds)..."
        cat > /tmp/gcp-bindings.hcl <<'EOFBIND'
        resource "//cloudresourcemanager.googleapis.com/projects/PROJECT_ID_PLACEHOLDER" {
          roles = ["roles/compute.instanceAdmin.v1","roles/compute.networkAdmin","roles/compute.osLogin","roles/iam.serviceAccountAdmin","roles/iam.workloadIdentityPoolAdmin"]
        }
        EOFBIND
        sed -i.bak "s/PROJECT_ID_PLACEHOLDER/${PROJECT_ID}/g" /tmp/gcp-bindings.hcl
        vault write gcp/roleset/terraform-provisioner project="${PROJECT_ID}" secret_type="access_token" token_scopes="https://www.googleapis.com/auth/cloud-platform" bindings=@/tmp/gcp-bindings.hcl
        rm -f /tmp/gcp-bindings.hcl /tmp/gcp-bindings.hcl.bak
        echo "Testing token generation..."
        vault read gcp/token/terraform-provisioner
      - echo "✓ GCP secrets engine configured"

  setup-vault-aap:
    desc: "Store AAP OAuth2 credentials in Vault"
    cmds:
      - echo "Storing AAP credentials..."
      - |
        read -p "Enter AAP OAuth2 Client ID: " CLIENT_ID
        read -sp "Enter AAP OAuth2 Client Secret: " CLIENT_SECRET
        echo
        read -p "Enter AAP username: " USERNAME
        read -sp "Enter AAP password: " PASSWORD
        echo
        vault kv put secret/aap/oauth2 client_id="${CLIENT_ID}" client_secret="${CLIENT_SECRET}" username="${USERNAME}" password="${PASSWORD}"
      - echo "✓ AAP credentials stored"

  # OS Login setup
  setup-os-login:
    desc: "Setup OS Login SSH access"
    cmds:
      - echo "=== OS Login Setup ==="
      - |
        if [ ! -f $HOME/.ssh/id_rsa.pub ]; then
          echo "Generating SSH key pair..."
          ssh-keygen -t rsa -b 4096 -f $HOME/.ssh/id_rsa -N ""
        fi
      - echo "Adding SSH key to OS Login..."
      - gcloud compute os-login ssh-keys add --key-file=$HOME/.ssh/id_rsa.pub
      - echo "Your OS Login username:"
      - gcloud compute os-login describe-profile --format="value(posixAccounts[0].username)"
      - echo "✓ Use this username in Terraform variable 'ansible_user'"


  # Vault SSH setup for dynamic AAP credentials
  setup-vault-ssh:
    desc: "Setup Vault SSH secrets engine for dynamic AAP credentials"
    cmds:
      - echo "=== Setting up Vault SSH Secrets Engine ==="
      - bash scripts/setup-vault-ssh.sh
      - echo ""
      - echo "✓ Vault SSH setup complete"
      - echo ""
      - echo "Next steps:"
      - echo "1. Run 'task get-vault-ssh-ca' to get CA public key"
      - echo "2. Run 'task setup-aap-vault-credential' for AAP setup instructions"

  get-vault-ssh-ca:
    desc: "Get Vault SSH CA public key for GCP OS Login"
    cmds:
      - echo "=== Vault SSH CA Public Key ==="
      - vault read -field=public_key ssh/config/ca
      - echo ""
      - echo "Add this key to GCP OS Login:"
      - echo "gcloud compute os-login ssh-keys add --key='<paste-key-above>' --ttl=365d"

  setup-aap-vault-credential:
    desc: "Display instructions for setting up Vault SSH credential in AAP"
    cmds:
      - echo "=== AAP Vault SSH Credential Setup ==="
      - echo ""
      - echo "1. Create Custom Credential Type in AAP"
      - echo "   - Administration > Credential Types > Add"
      - echo "   - Name - Vault SSH Certificate"
      - echo "   - Copy content from scripts/aap-credential-type.json"
      - echo ""
      - echo "2. Get AppRole Credentials"
      - echo "   - Run 'task get-vault-approle-creds'"
      - echo ""
      - echo "3. Create Credential in AAP"
      - echo "   - Credentials > Add"
      - echo "   - Credential Type - Vault SSH Certificate"
      - echo "   - Fill in values from step 2"
      - echo "   - SSH Username - from 'task setup-os-login'"
      - echo "   - SSH Public Key - paste content of $HOME/.ssh/id_rsa.pub"
      - echo ""
      - echo "4. Use in Job Templates"
      - echo "   - Credentials will be dynamically generated (10-min TTL)"
      - echo "   - Automatic rotation on each job run"
      - echo "   - No static credentials stored in AAP"

  get-vault-approle-creds:
    desc: "Get AppRole credentials for AAP Vault SSH setup"
    cmds:
      - echo "=== AppRole Credentials for AAP ==="
      - echo ""
      - echo "Role ID:"
      - vault kv get -field=role_id secret/aap/approle
      - echo ""
      - echo "Secret ID:"
      - vault kv get -field=secret_id secret/aap/approle
      - echo ""
      - echo "Vault Address - $VAULT_ADDR"
      - echo "Vault Namespace - $VAULT_NAMESPACE"
      - echo "SSH Role - aap-oslogin"


  test-vault-ssh:
    desc: "Test Vault SSH secrets engine integration"
    cmds:
      - echo "=== Testing Vault SSH Integration ==="
      - bash scripts/test-vault-ssh.sh

  test-local-setup:
    desc: "Comprehensive local testing of all Vault SSH setup steps"
    cmds:
      - echo "=== Running Comprehensive Local Tests ==="
      - bash scripts/test-local-setup.sh





  # AAP setup guide
  setup-aap-guide:
    desc: "Display AAP setup instructions for AAP 2.6"
    cmds:
      - echo "=== AAP 2.6 Setup Guide (Simplified) ==="
      - echo ""
      - echo "IMPORTANT - This playbook only needs SSH access to VMs"
      - echo "No GCP API credentials required in AAP"
      - echo ""
      - echo "1. Create OAuth2 Application"
      - echo "   - Administration > Applications > Add"
      - echo "   - Name - Terraform Automation"
      - echo "   - Grant Type - Resource owner password-based"
      - echo "   - Client Type - Confidential"
      - echo "   - Save and note Client ID and Secret"
      - echo ""
      - echo "2. Create SSH Credential"
      - echo "   Option A - Static Credential (Quick Start)"
      - echo "   - Credentials > Add"
      - echo "   - Name - OS Login SSH"
      - echo "   - Credential Type - Machine"
      - echo "   - Username - Run 'task setup-os-login' to get username"
      - echo "   - SSH Private Key - Paste content of $HOME/.ssh/id_rsa"
      - echo "   - Privilege Escalation Method - sudo"
      - echo ""
      - echo "   Option B - Vault-Managed (Production Recommended)"
      - echo "   - Configure Vault SSH secrets engine"
      - echo "   - Create custom AAP credential type for Vault"
      - echo "   - Credentials auto-rotate, never stored in AAP"
      - echo "   - See https://www.hashicorp.com/en/blog/managing-ansible-automation-platform-aap-credentials-at-scale-with-vault"
      - echo ""
      - echo "3. Inventory (Automatically Created by Terraform)"
      - echo "   IMPORTANT - No manual inventory setup needed!"
      - echo "   - Terraform creates inventory automatically via aap_inventory resource"
      - echo "   - Inventory name - {environment}-gcp-vms (e.g. demo-gcp-vms)"
      - echo "   - Hosts are auto-registered with connection details"
      - echo "   - Updates automatically when VMs change"
      - echo "   - See terraform/actions.tf for implementation"
      - echo ""
      - echo "4. Create Job Template"
      - echo "   - Templates > Add > Job Template"
      - echo "   - Name - Patch GCP VMs"
      - echo "   - Inventory - GCP VMs"
      - echo "   - Project - Your project with playbook"
      - echo "   - Playbook - ansible/gcp_vm_patching_demo.yml"
      - echo "   - Credentials - Select ONLY the SSH credential"
      - echo "   - Variables - patch_type=security, reboot_allowed=true"
      - echo "   - Note the Template ID for Terraform variable"
      - echo ""
      - echo "That is it! No GCP credentials needed in AAP."

  # Helper tasks
  get-oidc-config:
    desc: "Get OIDC configuration for AAP"
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform output oidc_configuration

  get-gcp-sa-email:
    desc: "Get GCP service account email for AAP credential"
    cmds:
      - |
        PROJECT_ID=$(gcloud config get-value project)
        echo "Service Account Email: terraform-aap@${PROJECT_ID}.iam.gserviceaccount.com"
        echo ""
        echo "If this service account does not exist, create it with:"
        echo "gcloud iam service-accounts create terraform-aap --display-name='Terraform AAP'"

  get-gcp-sa-key:
    desc: "Create and display GCP service account key for AAP"
    cmds:
      - |
        PROJECT_ID=$(gcloud config get-value project)
        SA_EMAIL="terraform-aap@${PROJECT_ID}.iam.gserviceaccount.com"
        echo "Checking if service account exists..."
        if ! gcloud iam service-accounts describe ${SA_EMAIL} >/dev/null 2>&1; then
          echo "Service account does not exist. Creating..."
          gcloud iam service-accounts create terraform-aap --display-name="Terraform AAP"
          echo "Granting necessary permissions..."
          gcloud projects add-iam-policy-binding ${PROJECT_ID} --member="serviceAccount:${SA_EMAIL}" --role="roles/compute.instanceAdmin.v1" --condition=None
          gcloud projects add-iam-policy-binding ${PROJECT_ID} --member="serviceAccount:${SA_EMAIL}" --role="roles/compute.osLogin" --condition=None
          echo "Waiting for IAM propagation (5 seconds)..."
          sleep 5
        fi
        echo "Creating service account key..."
        gcloud iam service-accounts keys create /tmp/aap-sa-key.json --iam-account=${SA_EMAIL}
        echo ""
        echo "=== Copy the content below and paste into AAP credential ==="
        cat /tmp/aap-sa-key.json
        echo ""
        echo "=== End of key content ==="
        rm -f /tmp/aap-sa-key.json
        echo ""
        echo "Key has been deleted from local system for security"

  test-vault:
    desc: "Test Vault configuration"
    cmds:
      - echo "Testing Vault GCP token generation..."
      - vault read gcp/token/terraform-provisioner
      - echo "Testing Vault AAP credentials..."
      - vault kv get secret/aap/oauth2

  test-deployment:
    desc: "Test deployment after infrastructure is created"
    cmds:
      - echo "=== Testing Deployment ==="
      - task: test-vms
      - task: test-connectivity
      - echo "✓ Deployment test complete!"

  test-vms:
    desc: "Check if VMs are running"
    cmds:
      - echo "Checking VMs..."
      - gcloud compute instances list --filter="labels.goog-terraform-provisioned:true"

  test-connectivity:
    desc: "Test SSH connectivity to VMs"
    cmds:
      - echo "Testing SSH connectivity..."
      - |
        VM_NAME=$(gcloud compute instances list --filter="labels.goog-terraform-provisioned:true" --format="value(name)" --limit=1)
        if [ -n "$VM_NAME" ]; then
          gcloud compute ssh $VM_NAME --command="echo 'SSH connection successful'" --tunnel-through-iap
        else
          echo "No VMs found"
        fi

  # Cleanup
  clean:
    desc: "Clean temporary files and caches"
    cmds:
      - echo "Cleaning temporary files..."
      - rm -rf {{.TERRAFORM_DIR}}/.terraform
      - rm -f {{.TERRAFORM_DIR}}/.terraform.lock.hcl
      - rm -f /tmp/vault-admin-key.json
      - rm -f /tmp/key.pub
      - echo "✓ Cleanup complete"

  # Info
  info:
    desc: "Display project information"
    cmds:
      - echo "=== Project Information ==="
      - echo "Project - Terraform Actions with AAP and GCP VM Patching"
      - echo "Version - v2.1.0 (with Vault SSH)"
      - echo "Security - Zero static credentials (truly!)"
      - echo "Tasks - 26 automated tasks"
      - echo ""
      - echo "Quick Start (Static SSH)"
      - echo "  1. task validate"
      - echo "  2. task setup-vault"
      - echo "  3. task setup-os-login"
      - echo "  4. Push to GitHub (triggers HCP Terraform)"
      - echo "  5. task setup-aap-guide"
      - echo "  6. task test-deployment"
      - echo ""
      - echo "Production Setup (Vault SSH)"
      - echo "  1. task validate"
      - echo "  2. task setup-vault"
      - echo "  3. task setup-vault-ssh"
      - echo "  4. task setup-os-login"
      - echo "  5. task get-vault-ssh-ca (add to GCP OS Login)"
      - echo "  6. Push to GitHub"
      - echo "  7. task setup-aap-vault-credential"
      - echo "  8. task test-vault-ssh"
      - echo ""
      - echo "For detailed documentation see README.md"

  default:
    desc: "Show available tasks"
    cmds:
      - task --list
