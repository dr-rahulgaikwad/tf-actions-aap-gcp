version: '3'

vars:
  TERRAFORM_DIR: terraform

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  # ── Deployment ────────────────────────────────────────────────────────────

  bootstrap:
    desc: "One-time setup: Vault + GCP + HCP Terraform (run once per environment)"
    dir: bootstrap
    cmds:
      - |
        if [ ! -f terraform.tfvars ]; then
          cp terraform.tfvars.example terraform.tfvars
          echo "Created bootstrap/terraform.tfvars — edit it with your values, then re-run: task bootstrap"
          exit 0
        fi
      - terraform init
      - terraform apply
      - echo ""
      - echo "Bootstrap complete. Next: task add-ssh-ca"

  bootstrap-output:
    desc: "Show bootstrap outputs (AppRole creds, SSH CA key, next steps)"
    dir: bootstrap
    cmds:
      - terraform output

  add-ssh-ca:
    desc: "Print Vault SSH CA public key to set in HCP Terraform workspace"
    dir: bootstrap
    cmds:
      - |
        echo "=== Vault SSH CA Public Key ==="
        terraform output -raw vault_ssh_ca_public_key
        echo ""
        echo "Add this as a Terraform variable in HCP Terraform:"
        echo "  Key:   vault_ssh_ca_public_key"
        echo "  Value: (paste the key above)"
        echo ""
        echo "HCP Terraform → Workspace → Variables → Terraform Variables → Add"

  setup-aap:
    desc: "Print AAP setup guide (credential type, credential, project, job template)"
    cmds:
      - |
        echo "=== AAP Setup Guide ==="
        echo ""
        echo "1. Create Custom Credential Type"
        echo "   AAP UI → Administration → Credential Types → Add"
        echo "   Name: Vault SSH Certificate"
        echo "   Paste Input Configuration and Injector Configuration from scripts/aap-vault-ssh-credential.json"
        echo "   (two separate fields — do not paste the whole file at once)"
        echo ""
        echo "2. Get AppRole credentials"
        echo "   task bootstrap-output"
        echo ""
        echo "3. Create Credential"
        echo "   AAP UI → Resources → Credentials → Add"
        echo "   Credential Type: Vault SSH Certificate"
        echo "   Fill in Vault address, namespace, AppRole role_id and secret_id"
        echo "   SSH Username: ubuntu"
        echo ""
        echo "4. Create Project"
        echo "   AAP UI → Resources → Projects → Add"
        echo "   SCM Type: Git"
        echo "   SCM URL: https://github.com/dr-rahulgaikwad/tf-actions-aap-gcp"
        echo ""
        echo "5. Create Job Template"
        echo "   AAP UI → Resources → Templates → Add Job Template"
        echo "   Name: Patch GCP VMs"
        echo "   Inventory: demo-gcp-vms  (auto-created by Terraform — leave as-is)"
        echo "   Playbook: ansible/gcp_vm_patching_demo.yml"
        echo "   Credentials: Vault SSH Certificate"
        echo "   Variables: enable Prompt on launch"
        echo "   Note the Template ID from the URL"
        echo ""
        echo "6. Set aap_job_template_id in HCP Terraform workspace variables"

  deploy:
    desc: "Trigger a deployment (push to main)"
    cmds:
      - git add .
      - git commit -m "Deploy" || true
      - git push origin main
      - echo "Monitor the run at https://app.terraform.io"

  # ── Validation ────────────────────────────────────────────────────────────

  validate:
    desc: "Validate tools, GCP auth, Vault auth, and Terraform config"
    cmds:
      - task: validate-tools
      - task: validate-gcp
      - task: validate-vault
      - task: validate-terraform
      - echo "✓ All validations passed"

  validate-tools:
    desc: "Check required CLIs are installed"
    cmds:
      - command -v gcloud >/dev/null 2>&1 || (echo "✗ gcloud not found — brew install google-cloud-sdk" && exit 1)
      - command -v vault  >/dev/null 2>&1 || (echo "✗ vault not found  — brew install vault" && exit 1)
      - command -v task   >/dev/null 2>&1 || (echo "✗ task not found   — brew install go-task" && exit 1)
      - echo "✓ Tools OK"

  validate-gcp:
    desc: "Check GCP authentication and project"
    cmds:
      - gcloud auth list --filter=status:ACTIVE --format="value(account)" | grep -q . || (echo "✗ Not authenticated — run: gcloud auth login" && exit 1)
      - gcloud config get-value project | grep -q . || (echo "✗ No project set — run: gcloud config set project PROJECT_ID" && exit 1)
      - echo "✓ GCP OK (project: $(gcloud config get-value project))"

  validate-vault:
    desc: "Check Vault connectivity and authentication"
    cmds:
      - vault status >/dev/null || (echo "✗ Cannot reach Vault — check VAULT_ADDR" && exit 1)
      - vault token lookup >/dev/null || (echo "✗ Not authenticated to Vault — run: vault login" && exit 1)
      - echo "✓ Vault OK"

  validate-terraform:
    desc: "Check Terraform formatting and syntax"
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform fmt -check -recursive || (echo "⚠ Run 'terraform fmt -recursive' to fix formatting" && exit 1)
      - terraform validate
      - echo "✓ Terraform OK"

  # ── Testing ───────────────────────────────────────────────────────────────

  test:
    desc: "Run all post-deployment tests"
    cmds:
      - task: test-vault
      - task: test-vms
      - echo "✓ All tests passed"

  test-vault:
    desc: "Test Vault GCP token and AAP credential access"
    cmds:
      - echo "Testing GCP token generation..."
      - vault read gcp/token/terraform-provisioner
      - echo "Testing AAP credentials..."
      - vault kv get secret/aap/credentials

  test-vms:
    desc: "List running GCP VMs managed by Terraform"
    cmds:
      - gcloud compute instances list --filter="labels.managed_by=terraform" --format="table(name,zone,status,networkInterfaces[0].accessConfigs[0].natIP)"

  # ── Cleanup ───────────────────────────────────────────────────────────────

  clean:
    desc: "Remove local Terraform cache and temp files"
    cmds:
      - rm -rf {{.TERRAFORM_DIR}}/.terraform
      - rm -f {{.TERRAFORM_DIR}}/.terraform.lock.hcl
      - rm -f /tmp/aap_ssh_key /tmp/aap_ssh_key.pub /tmp/aap_ssh_key-cert.pub
      - echo "✓ Cleaned"
