version: '3'

tasks:
  # Main tasks
  deploy:
    desc: Deploy infrastructure
    dir: terraform
    cmds:
      - terraform init
      - terraform apply

  destroy:
    desc: Destroy infrastructure
    dir: terraform
    cmds:
      - terraform destroy

  test:
    desc: Validate configuration
    dir: terraform
    cmds:
      - terraform fmt -check -recursive
      - terraform validate

  # Setup tasks
  setup-os-login:
    desc: Add SSH key to GCP OS Login
    dir: terraform
    cmds:
      - terraform output -raw ansible_ssh_private_key > /tmp/key.pub
      - gcloud compute os-login ssh-keys add --key-file=/tmp/key.pub
      - rm /tmp/key.pub
      - echo "SSH key added. Your OS Login username:"
      - gcloud compute os-login describe-profile --format="value(posixAccounts[0].username)"

  # Helper tasks
  outputs:
    desc: Show Terraform outputs
    dir: terraform
    cmds:
      - terraform output

  ssh-key:
    desc: Get SSH private key for AAP
    dir: terraform
    cmds:
      - terraform output -raw ansible_ssh_private_key

  clean:
    desc: Clean temporary files
    cmds:
      - rm -rf terraform/.terraform
      - rm -f terraform/.terraform.lock.hcl
      - rm -f /tmp/key.pub
