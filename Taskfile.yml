version: '3'

vars:
  TERRAFORM_DIR: terraform
  TESTS_DIR: tests

tasks:
  setup:
    desc: "Complete setup guide"
    cmds:
      - echo "Setup Steps:"
      - echo "  1. task gcp-setup"
      - echo "  2. task gcp-create-key"
      - echo "  3. task vault-setup"
      - echo "  4. task tf-init"

  gcp-setup:
    desc: "Setup GCP service account with least privilege"
    cmds:
      - |
        export PROJECT_ID="${PROJECT_ID:-hc-4faa1ac49a5e46ecb46cfe87b37}"
        export SA_NAME="terraform-automation"
        export SA_EMAIL="${SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com"
        
        gcloud config set project "${PROJECT_ID}"
        gcloud services enable compute.googleapis.com osconfig.googleapis.com iam.googleapis.com iamcredentials.googleapis.com
        
        gcloud iam service-accounts create "${SA_NAME}" --display-name="Terraform Automation" 2>/dev/null || echo "Already exists"
        
        for role in compute.instanceAdmin.v1 compute.networkAdmin compute.securityAdmin osconfig.patchDeploymentAdmin iam.serviceAccountUser iam.workloadIdentityPoolAdmin; do
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/${role}" --condition=None --quiet
        done
        
        echo "✅ GCP service account configured"
    preconditions:
      - sh: command -v gcloud
        msg: "gcloud CLI not found"

  gcp-create-key:
    desc: "Create service account key and store in Vault"
    cmds:
      - |
        export PROJECT_ID="${PROJECT_ID:-hc-4faa1ac49a5e46ecb46cfe87b37}"
        export SA_EMAIL="terraform-automation@${PROJECT_ID}.iam.gserviceaccount.com"
        export KEY_FILE="terraform-sa-key.json"
        
        gcloud iam service-accounts keys create "${KEY_FILE}" --iam-account="${SA_EMAIL}"
        vault kv put secret/gcp/service-account @"${KEY_FILE}"
        vault kv get secret/gcp/service-account | grep project_id
        rm "${KEY_FILE}"
        echo "✅ Key stored in Vault"
    preconditions:
      - sh: command -v vault && vault status
        msg: "Vault CLI not found or cannot connect"

  vault-setup:
    desc: "Store AAP credentials in Vault"
    cmds:
      - echo "Store AAP API token:"
      - echo "  vault kv put secret/aap/api-token token=YOUR_TOKEN"

  tf-init:
    desc: "Initialize Terraform"
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform init

  tf-validate:
    desc: "Validate Terraform"
    dir: "{{.TERRAFORM_DIR}}"
    deps: [tf-init]
    cmds:
      - terraform fmt -recursive
      - terraform validate

  tf-plan:
    desc: "Run Terraform plan"
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform plan

  test:
    desc: "Run all tests"
    cmds:
      - task: test-terraform
      - task: test-ansible
      - task: test-python

  test-terraform:
    desc: "Validate Terraform"
    dir: "{{.TESTS_DIR}}"
    cmds:
      - chmod +x validate_terraform.sh
      - ./validate_terraform.sh

  test-ansible:
    desc: "Validate Ansible"
    dir: "{{.TESTS_DIR}}"
    cmds:
      - chmod +x validate_ansible.sh
      - ./validate_ansible.sh

  test-python:
    desc: "Run property-based tests"
    dir: "{{.TESTS_DIR}}"
    cmds:
      - |
        if [ ! -d "venv" ]; then
          python3 -m venv venv
          ./venv/bin/pip install -q -r requirements.txt
        fi
        ./venv/bin/pytest -v
    preconditions:
      - sh: command -v python3
        msg: "Python 3 not found"

  validate-production:
    desc: "Validate production readiness"
    cmds:
      - ./validate-production.sh

  clean:
    desc: "Clean temporary files"
    cmds:
      - rm -rf {{.TERRAFORM_DIR}}/.terraform {{.TERRAFORM_DIR}}/.terraform.lock.hcl
      - rm -rf {{.TESTS_DIR}}/__pycache__ {{.TESTS_DIR}}/.pytest_cache {{.TESTS_DIR}}/.hypothesis {{.TESTS_DIR}}/venv
      - echo "✅ Cleaned"

  help:
    desc: "Show available tasks"
    cmds:
      - task --list

  default:
    cmds:
      - task: help
