[defaults]
host_key_checking = False
timeout = 60
pipelining = True
stdout_callback = yaml

[ssh_connection]
ssh_args = -i /tmp/aap_ssh_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30
retries = 3
control_path_dir = /tmp/.ansible/cp
control_path = %(directory)s/%%h-%%r
