[defaults]
host_key_checking = False
timeout = 60
# Increase pipelining to reduce SSH round-trips (speeds up module execution)
pipelining = True
# Ensure stdout callback is readable in AAP
stdout_callback = yaml

[ssh_connection]
ssh_args = -o CertificateFile=/tmp/aap_ssh_key-cert.pub -i /tmp/aap_ssh_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6
retries = 3
# Required for pipelining + become to work correctly
control_path_dir = /tmp/.ansible/cp
control_path = %(directory)s/%%h-%%r
