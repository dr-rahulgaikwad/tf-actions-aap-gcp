---
# Play 1: Sign SSH certificate via Vault (runs on AAP execution node)
- name: Setup Vault SSH certificate
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Authenticate to Vault via AppRole
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/auth/approle/login"
        method: POST
        headers:
          X-Vault-Namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('admin') }}"
        body_format: json
        body:
          role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
          secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
        validate_certs: no
        status_code: 200
      register: vault_login
      retries: 3
      delay: 5
      until: vault_login.status == 200

    - name: Set Vault token fact
      set_fact:
        vault_token: "{{ vault_login.json.auth.client_token }}"

    - name: Remove stale SSH keypair
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/aap_ssh_key
        - /tmp/aap_ssh_key.pub
        - /tmp/aap_ssh_key-cert.pub

    - name: Generate ephemeral SSH keypair
      command: ssh-keygen -t ed25519 -f /tmp/aap_ssh_key -N "" -C "aap-ephemeral"

    - name: Set correct permissions on private key
      file:
        path: /tmp/aap_ssh_key
        mode: "0600"

    - name: Read public key
      slurp:
        src: /tmp/aap_ssh_key.pub
      register: ssh_pubkey

    - name: Sign public key with Vault SSH CA
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/ssh/sign/{{ lookup('env', 'VAULT_SSH_ROLE') | default('aap-ssh') }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
          X-Vault-Namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('admin') }}"
        body_format: json
        body:
          public_key: "{{ ssh_pubkey.content | b64decode }}"
          valid_principals: "{{ vault_ssh_user | default(ansible_user) }}"
        validate_certs: no
        status_code: 200
      register: vault_ssh_cert
      retries: 3
      delay: 5
      until: vault_ssh_cert.status == 200

    - name: Write signed certificate to disk
      copy:
        content: "{{ vault_ssh_cert.json.data.signed_key }}"
        dest: /tmp/aap_ssh_key-cert.pub
        mode: "0600"

    - name: Debug SSH setup
      debug:
        msg:
          - "Vault auth: OK"
          - "SSH cert signed for principal: {{ vault_ssh_user | default(ansible_user) }}"
          - "Cert serial: {{ vault_ssh_cert.json.data.serial_number }}"

    # Build dynamic inventory from vm_hosts extra_var passed by Terraform
    # This replaces aap_host Terraform resources which caused parallel AAP refresh crashes
    - name: Add VMs to dynamic inventory
      add_host:
        name: "{{ item.key }}"
        groups: gcp_vms
        ansible_host: "{{ item.value }}"
        ansible_user: "{{ ansible_user | default('ubuntu') }}"
        ansible_ssh_private_key_file: /tmp/aap_ssh_key
        ansible_ssh_common_args: >-
          -o CertificateFile=/tmp/aap_ssh_key-cert.pub
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -o ConnectTimeout=30
          -o ServerAliveInterval=10
          -o ServerAliveCountMax=6
      loop: "{{ vm_hosts | dict2items }}"
      when: vm_hosts is defined

# Play 2: Patch VMs using the Vault-signed certificate
- name: Patch GCP Ubuntu VMs
  hosts: gcp_vms
  remote_user: "{{ ansible_user | default('ubuntu') }}"
  become: yes
  become_method: sudo
  gather_facts: no

  vars:
    apt_cache_valid_time: 3600
    reboot_timeout: 600
    patch_type: "{{ patch_type | default('security') }}"
    reboot_allowed: "{{ reboot_allowed | default(true) }}"
    ansible_become_exe: /usr/bin/sudo
    ansible_become_flags: "-H -S -n"

  pre_tasks:
    - name: Wait for SSH port to be open
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 300
        delay: 5
        state: started
      delegate_to: localhost
      become: no

    - name: Wait for SSH connection to be usable
      wait_for_connection:
        connect_timeout: 20
        timeout: 300
        delay: 5
        sleep: 10

    - name: Gather facts
      setup:

    - name: Debug connection info
      debug:
        msg:
          - "Connected to: {{ inventory_hostname }} ({{ ansible_host }})"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: "{{ apt_cache_valid_time }}"
      register: apt_update
      retries: 3
      delay: 10
      until: apt_update is succeeded

    - name: Apply patches
      apt:
        upgrade: dist
        update_cache: no
        autoremove: yes
        autoclean: yes
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: upgrade_result
      retries: 2
      delay: 30
      until: upgrade_result is succeeded

    - name: Check if reboot required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Parse upgraded packages
      set_fact:
        patched_packages: "{{ upgrade_result.stdout | regex_findall('Unpacking ([^\\s:]+)') | unique }}"

    - name: Store per-host patch result
      set_stats:
        data:
          patch_results: >-
            {{ (patch_results | default([])) + [{
              'host': inventory_hostname,
              'ip': ansible_host,
              'changed': upgrade_result.changed,
              'package_count': patched_packages | length,
              'packages': patched_packages,
              'reboot_required': reboot_required.stat.exists
            }] }}
        aggregate: yes
        per_host: no

    - name: Reboot if required and allowed
      reboot:
        msg: "Reboot by Ansible patching"
        reboot_timeout: "{{ reboot_timeout }}"
        pre_reboot_delay: 5
        post_reboot_delay: 30
        test_command: uptime
      when:
        - reboot_required.stat.exists
        - reboot_allowed | bool

# Play 3: Summary
- name: Patching summary
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Print per-host patch report
      debug:
        msg: >-
          [{{ item.host }}] ({{ item.ip }})
          | Patched: {{ item.changed }}
          | Packages: {{ item.package_count }}
          | Reboot required: {{ item.reboot_required }}
          | {{ item.packages | join(', ') if item.changed else 'No changes' }}
      loop: "{{ patch_results | default([]) }}"
      loop_control:
        label: "{{ item.host }}"

    - name: Print overall summary
      debug:
        msg:
          - "========================================"
          - "         PATCH SUMMARY REPORT          "
          - "========================================"
          - "Environment  : {{ environment | default('unknown') }}"
          - "Patch type   : {{ patch_type | default('security') }}"
          - "Total VMs    : {{ patch_results | default([]) | length }}"
          - "VMs patched  : {{ patch_results | default([]) | selectattr('changed', 'equalto', true) | list | length }}"
          - "VMs unchanged: {{ patch_results | default([]) | selectattr('changed', 'equalto', false) | list | length }}"
          - "Reboots needed: {{ patch_results | default([]) | selectattr('reboot_required', 'equalto', true) | list | length }}"
          - "Total packages upgraded: {{ patch_results | default([]) | sum(attribute='package_count') }}"
          - "========================================"
          - "Total packages upgraded: {{ patch_results | default([]) | sum(attribute='package_count') }}"
          - "========================================"
