---
- name: Add VMs to inventory dynamically
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Add hosts from vm_inventory
      add_host:
        name: "{{ item.key }}"
        ansible_host: "{{ item.value.ansible_host }}"
        ansible_user: "{{ item.value.ansible_user }}"
        ansible_ssh_common_args: "{{ item.value.ansible_ssh_common_args | default('-o StrictHostKeyChecking=no') }}"
        groups: gcp_vms
      loop: "{{ vm_inventory.all.hosts | dict2items }}"
      when: vm_inventory is defined

- name: Security Patching - Day 2 Operations Demo
  hosts: gcp_vms
  become: yes
  gather_facts: no
  
  vars:
    ansible_user: ubuntu
    apt_cache_valid_time: 3600
    reboot_timeout: 300
    patch_type: "{{ patch_type | default('security') }}"
  
  tasks:
    # ========================================
    # Phase 0: Wait for VMs to be Ready
    # ========================================
    - name: Wait for VMs to be accessible via SSH
      wait_for_connection:
        timeout: 600
        delay: 10
        sleep: 5
      register: connection_result
      until: connection_result is succeeded
      retries: 5
      delay: 30
      ignore_errors: yes
    
    - name: Fail if connection could not be established
      fail:
        msg: "Failed to connect to {{ inventory_hostname }} after multiple retries"
      when: connection_result is failed
    
    - name: Gather facts after connection established
      setup:
    
    # ========================================
    # Phase 1: Pre-Patching Assessment
    # ========================================
    - name: "PHASE 1: Pre-Patching Assessment"
      debug:
        msg: "Starting security assessment for {{ inventory_hostname }}"
    
    - name: Gather system information
      setup:
        gather_subset:
          - '!all'
          - '!min'
          - distribution
          - distribution_version
          - kernel
    
    - name: Display current system state
      debug:
        msg: |
          ========================================
          System: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Uptime: {{ ansible_uptime_seconds | int // 86400 }} days
          ========================================
    
    - name: Check current kernel version
      command: uname -r
      register: current_kernel
      changed_when: false
    
    - name: Check for available security updates
      shell: |
        apt-get update > /dev/null 2>&1
        apt-get -s upgrade | grep -i security | wc -l
      register: security_updates_count
      changed_when: false
      failed_when: false
    
    - name: List available security updates
      shell: |
        apt list --upgradable 2>/dev/null | grep -i security || echo "No security updates available"
      register: security_updates_list
      changed_when: false
      failed_when: false
    
    - name: Display security updates available
      debug:
        msg: |
          ========================================
          SECURITY UPDATES AVAILABLE: {{ security_updates_count.stdout | default('0') }}
          ========================================
          {{ security_updates_list.stdout_lines | join('\n') }}
          ========================================
    
    # ========================================
    # Phase 2: Apply Security Patches
    # ========================================
    - name: "PHASE 2: Applying Security Patches"
      debug:
        msg: "Installing security updates on {{ inventory_hostname }}"
    
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: "{{ apt_cache_valid_time }}"
      register: apt_update_result
    
    - name: Upgrade security packages only
      apt:
        upgrade: safe
        autoremove: yes
        autoclean: yes
      register: apt_upgrade_result
      when: patch_type == 'security'
    
    - name: Upgrade all packages (if full upgrade requested)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: apt_full_upgrade_result
      when: patch_type == 'full'
    
    - name: Set upgrade result variable
      set_fact:
        upgrade_result: "{{ apt_upgrade_result if patch_type == 'security' else apt_full_upgrade_result }}"
    
    - name: Display patching results
      debug:
        msg: |
          ========================================
          PATCHING RESULTS
          ========================================
          Packages Updated: {{ upgrade_result.changed }}
          Patch Type: {{ patch_type }}
          Status: {{ 'SUCCESS' if not upgrade_result.failed else 'FAILED' }}
          {% if upgrade_result.changed %}
          Packages Changed: {{ upgrade_result.stdout_lines | default([]) | length }}
          {% endif %}
          ========================================
    
    - name: Show detailed package changes (if any)
      debug:
        msg: "{{ upgrade_result.stdout_lines }}"
      when: upgrade_result.changed and upgrade_result.stdout_lines is defined
    
    # ========================================
    # Phase 3: Post-Patching Verification
    # ========================================
    - name: "PHASE 3: Post-Patching Verification"
      debug:
        msg: "Verifying patch installation on {{ inventory_hostname }}"
    
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
    
    - name: Check which packages require reboot
      shell: cat /var/run/reboot-required.pkgs 2>/dev/null || echo "No packages require reboot"
      register: reboot_packages
      changed_when: false
      when: reboot_required.stat.exists
    
    - name: Display reboot requirement
      debug:
        msg: |
          ========================================
          REBOOT REQUIRED: {{ 'YES' if reboot_required.stat.exists else 'NO' }}
          ========================================
          {% if reboot_required.stat.exists %}
          Packages requiring reboot:
          {{ reboot_packages.stdout_lines | join('\n') }}
          {% else %}
          No reboot required - patches applied successfully
          {% endif %}
          ========================================
    
    - name: Perform reboot if required and allowed
      block:
        - name: Reboot the system
          reboot:
            msg: "Reboot initiated by Ansible security patching"
            reboot_timeout: "{{ reboot_timeout }}"
            pre_reboot_delay: 5
            post_reboot_delay: 30
          register: reboot_result
        
        - name: Verify system is back online
          wait_for_connection:
            timeout: 300
            delay: 10
        
        - name: Check new kernel version after reboot
          command: uname -r
          register: new_kernel
          changed_when: false
        
        - name: Display reboot results
          debug:
            msg: |
              ========================================
              REBOOT COMPLETED
              ========================================
              Previous Kernel: {{ current_kernel.stdout }}
              Current Kernel: {{ new_kernel.stdout }}
              Kernel Updated: {{ 'YES' if current_kernel.stdout != new_kernel.stdout else 'NO' }}
              ========================================
      
      when: 
        - reboot_required.stat.exists
        - reboot_allowed | default(true) | bool
    
    - name: Skip reboot (not allowed)
      debug:
        msg: |
          ========================================
          REBOOT SKIPPED
          ========================================
          Reboot is required but not allowed by policy
          Manual reboot required during maintenance window
          ========================================
      when:
        - reboot_required.stat.exists
        - not (reboot_allowed | default(true) | bool)
    
    # ========================================
    # Phase 4: Final Security Assessment
    # ========================================
    - name: "PHASE 4: Final Security Assessment"
      debug:
        msg: "Performing post-patch security assessment"
    
    - name: Check for remaining security updates
      shell: |
        apt-get update > /dev/null 2>&1
        apt list --upgradable 2>/dev/null | grep -i security | wc -l
      register: remaining_updates
      changed_when: false
      failed_when: false
    
    - name: Verify critical services are running
      service_facts:
    
    - name: Display final security status
      debug:
        msg: |
          ========================================
          FINAL SECURITY STATUS
          ========================================
          Host: {{ inventory_hostname }}
          Patching Status: COMPLETED
          Remaining Security Updates: {{ remaining_updates.stdout | default('0') }}
          System Uptime: {{ ansible_uptime_seconds | int // 60 }} minutes
          Patch Compliance: {{ 'COMPLIANT' if remaining_updates.stdout | int == 0 else 'NEEDS ATTENTION' }}
          ========================================
    
    # ========================================
    # Phase 5: Generate Compliance Report
    # ========================================
    - name: "PHASE 5: Generate Compliance Report"
      debug:
        msg: "Generating compliance report for {{ inventory_hostname }}"
    
    - name: Create compliance report
      set_fact:
        compliance_report:
          hostname: "{{ inventory_hostname }}"
          ip_address: "{{ ansible_host }}"
          os_version: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel_version: "{{ ansible_kernel }}"
          patch_date: "{{ ansible_date_time.iso8601 }}"
          patches_applied: "{{ upgrade_result.changed }}"
          reboot_performed: "{{ reboot_result.rebooted | default(false) }}"
          security_updates_remaining: "{{ remaining_updates.stdout | default('0') }}"
          compliance_status: "{{ 'COMPLIANT' if remaining_updates.stdout | int == 0 else 'NEEDS_ATTENTION' }}"
    
    - name: Display compliance report
      debug:
        msg: |
          ========================================
          COMPLIANCE REPORT
          ========================================
          {{ compliance_report | to_nice_yaml }}
          ========================================

- name: Generate Summary Report
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display patching summary
      debug:
        msg: |
          ========================================
          PATCHING OPERATION SUMMARY
          ========================================
          Total Hosts: {{ groups['gcp_vms'] | length }}
          Patch Type: {{ patch_type | default('security') }}
          Operation: COMPLETED
          ========================================
          
          Next Steps:
          1. Review compliance reports for each host
          2. Schedule manual reboots if required
          3. Update change management system
          4. Monitor systems for 24 hours post-patch
          ========================================
