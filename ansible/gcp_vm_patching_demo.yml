---
# Play 1: Sign SSH certificate via Vault (runs on AAP execution node)
- name: Setup Vault SSH certificate
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Authenticate to Vault via AppRole
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/auth/approle/login"
        method: POST
        headers:
          X-Vault-Namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('admin', true) }}"
        body_format: json
        body:
          role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
          secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
        validate_certs: no
        status_code: 200
      register: vault_login
      retries: 3
      delay: 5
      until: vault_login.status == 200

    - name: Set Vault token fact
      set_fact:
        vault_token: "{{ vault_login.json.auth.client_token }}"

    - name: Remove stale SSH keypair if exists
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/aap_ssh_key
        - /tmp/aap_ssh_key.pub
        - /tmp/aap_ssh_key-cert.pub

    - name: Generate ephemeral SSH keypair
      command: ssh-keygen -t ed25519 -f /tmp/aap_ssh_key -N "" -C "aap-ephemeral"

    - name: Read public key
      slurp:
        src: /tmp/aap_ssh_key.pub
      register: ssh_pubkey

    - name: Sign public key with Vault SSH CA
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/ssh/sign/{{ lookup('env', 'VAULT_SSH_ROLE') | default('aap-ssh', true) }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
          X-Vault-Namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('admin', true) }}"
        body_format: json
        body:
          public_key: "{{ ssh_pubkey.content | b64decode }}"
          valid_principals: "{{ vault_ssh_user | default(ansible_user) }}"
        validate_certs: no
        status_code: 200
      register: vault_ssh_cert
      retries: 3
      delay: 5
      until: vault_ssh_cert.status == 200

    - name: Write signed certificate to disk
      copy:
        content: "{{ vault_ssh_cert.json.data.signed_key }}"
        dest: /tmp/aap_ssh_key-cert.pub
        mode: "0600"

    - name: Set correct permissions on private key
      file:
        path: /tmp/aap_ssh_key
        mode: "0600"

    - name: Debug SSH setup
      debug:
        msg:
          - "Vault auth: OK"
          - "SSH cert signed for principal: {{ vault_ssh_user | default(ansible_user) }}"
          - "Cert serial: {{ vault_ssh_cert.json.data.serial_number }}"
          - "Private key: /tmp/aap_ssh_key"
          - "Certificate: /tmp/aap_ssh_key-cert.pub"

# Play 2: Patch VMs using the signed certificate
- name: Patch GCP Ubuntu VMs using OS Login
  hosts: all
  # OS Login: sudo is available but requires full path on some distros.
  # become_method: sudo works; we set the full sudo path to handle PATH issues.
  become: yes
  become_method: sudo
  gather_facts: no

  vars:
    apt_cache_valid_time: 3600
    reboot_timeout: 600
    patch_type: "{{ patch_type | default('security') }}"
    reboot_allowed: "{{ reboot_allowed | default(true) }}"

    # SSH connection — use the Vault-signed certificate
    ansible_ssh_private_key_file: /tmp/aap_ssh_key
    ansible_ssh_common_args: >-
      -o CertificateFile=/tmp/aap_ssh_key-cert.pub
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ConnectTimeout=30
      -o ServerAliveInterval=10
      -o ServerAliveCountMax=6

    # GCP OS Login: sudo binary is at /usr/bin/sudo but PATH may be minimal
    ansible_become_exe: /usr/bin/sudo
    # Pass a clean PATH so modules can find system binaries
    ansible_become_flags: "-H -S -n"

  pre_tasks:
    - name: Wait for SSH port to be open
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 300
        delay: 5
        state: started
      delegate_to: localhost
      become: no

    - name: Wait for SSH connection to be usable
      wait_for_connection:
        connect_timeout: 20
        timeout: 300
        delay: 5
        sleep: 10

    - name: Gather facts
      setup:

    - name: Debug connection info
      debug:
        msg:
          - "Connected to: {{ inventory_hostname }} ({{ ansible_host }})"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: "{{ apt_cache_valid_time }}"
      register: apt_update
      retries: 3
      delay: 10
      until: apt_update is succeeded

    - name: Check available updates
      shell: apt list --upgradable 2>/dev/null | grep -v "Listing..." | wc -l
      register: update_count
      changed_when: false

    - name: Debug pre-patch status
      debug:
        msg: "{{ inventory_hostname }}: {{ update_count.stdout }} updates available"

    - name: Apply patches
      apt:
        upgrade: dist
        update_cache: no
        autoremove: yes
        autoclean: yes
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: upgrade_result
      retries: 2
      delay: 30
      until: upgrade_result is succeeded

    - name: Debug patch result
      debug:
        msg: "{{ inventory_hostname }}: patching {{ 'changed packages' if upgrade_result.changed else 'no changes' }}"

    - name: Check if reboot required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required and allowed
      reboot:
        msg: "Reboot by Ansible patching"
        reboot_timeout: "{{ reboot_timeout }}"
        pre_reboot_delay: 5
        post_reboot_delay: 30
        test_command: uptime
      when:
        - reboot_required.stat.exists
        - reboot_allowed | bool
      register: reboot_result

    - name: Debug reboot status
      debug:
        msg: >-
          {{ inventory_hostname }}: {{
            'rebooted successfully' if (reboot_result is defined and reboot_result.rebooted)
            else ('reboot required but skipped' if reboot_required.stat.exists
            else 'no reboot needed') }}

# Play 3: Summary
- name: Patching summary
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Summary report
      debug:
        msg:
          - "=== PATCHING COMPLETE ==="
          - "Environment: {{ environment | default('unknown') }}"
          - "Patch type: {{ patch_type | default('security') }}"
          - "VMs targeted: {{ groups['all'] | length }}"
